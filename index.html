<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexoria Agro Core | Sürü Yönetimi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #0b1120; color: #f8fafc; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass-card { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 1.5rem; }
        .neon-blue { border-left: 4px solid #38bdf8; box-shadow: -10px 0 20px rgba(56, 189, 248, 0.05); }
        .neon-green { border-left: 4px solid #22c55e; box-shadow: -10px 0 20px rgba(34, 197, 94, 0.05); }
        @media print { .no-print { display: none !important; } .print-only { display: block; } body { background: white; color: black; } }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- Üst Bar -->
    <nav class="flex flex-col md:flex-row justify-between items-center mb-8 glass-card p-6 no-print">
        <div class="flex items-center gap-4 mb-4 md:mb-0">
            <div class="bg-sky-500 p-3 rounded-2xl shadow-lg shadow-sky-500/20">
                <i class="fas fa-microchip text-white text-2xl"></i>
            </div>
            <div>
                <h1 class="text-2xl font-black tracking-tighter uppercase">Nexoria <span class="text-sky-400 italic font-light tracking-widest text-sm">Agro Core</span></h1>
                <p id="sync-status" class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Adafruit Bekleniyor...</p>
            </div>
        </div>
        <div class="flex gap-3">
            <button onclick="window.print()" class="bg-white text-black px-5 py-2 rounded-xl font-black text-xs hover:bg-sky-400 transition">RAPOR AL (PDF)</button>
        </div>
    </nav>

    <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
        
        <!-- Sol Kolon: Yönetim -->
        <div class="space-y-6 no-print">
            
            <!-- Manuel Hayvan Ekleme -->
            <div class="glass-card p-6 neon-green">
                <h3 class="text-xs font-black text-green-400 uppercase tracking-widest mb-4 italic">Hayvan Ekle</h3>
                <div class="space-y-3">
                    <input type="text" id="add-rfid" placeholder="RFID Kart No" class="w-full bg-slate-900/50 border border-slate-700 p-3 rounded-xl text-xs focus:border-green-500 outline-none">
                    <input type="text" id="add-name" placeholder="İnek İsmi" class="w-full bg-slate-900/50 border border-slate-700 p-3 rounded-xl text-xs focus:border-green-500 outline-none">
                    <button onclick="hayvanEkle()" class="w-full bg-green-500/20 text-green-500 border border-green-500/30 font-black py-3 rounded-xl text-[10px] uppercase hover:bg-green-500 hover:text-white transition">Sisteme Kaydet</button>
                </div>
            </div>

            <!-- Sürü Listesi -->
            <div class="glass-card p-6">
                <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest mb-4 italic italic">Kayıtlı Sürü</h3>
                <div id="animal-list" class="space-y-2 max-h-[400px] overflow-y-auto pr-2">
                    <!-- Dinamik Butonlar -->
                </div>
            </div>
        </div>

        <!-- Sağ Kolon: Canlı Veri ve Grafik -->
        <div class="lg:col-span-3 space-y-6">
            
            <!-- Büyük Veri Kartı -->
            <div id="active-display" class="glass-card p-8 neon-blue relative overflow-hidden">
                <div class="flex flex-col md:flex-row justify-between gap-6 relative z-10">
                    <div class="flex-1">
                        <p class="text-sky-400 text-xs font-black tracking-[0.3em] uppercase mb-1">Seçili Hayvan Dökümü</p>
                        <h2 id="view-id" class="text-5xl font-mono font-black text-white">#------</h2>
                        <h3 id="view-name" class="text-2xl text-gray-400 font-bold uppercase mt-1">Veri Bekleniyor</h3>
                    </div>
                    
                    <!-- Anlık Metrikler -->
                    <div class="flex gap-4">
                        <div class="bg-slate-900/80 p-6 rounded-2xl border border-slate-800 min-w-[140px] text-center">
                            <p class="text-[10px] font-black text-gray-500 uppercase mb-2">Güncel Kilo</p>
                            <span id="last-kg" class="text-3xl font-black text-white">0</span> <span class="text-xs text-sky-400 font-bold">KG</span>
                        </div>
                        <div class="bg-slate-900/80 p-6 rounded-2xl border border-slate-800 min-w-[140px] text-center">
                            <p class="text-[10px] font-black text-gray-500 uppercase mb-2">Vücut Isısı</p>
                            <span id="last-temp" class="text-3xl font-black text-white">0</span> <span class="text-xs text-red-400 font-bold">°C</span>
                        </div>
                    </div>
                </div>

                <!-- Ölçüm Geçmişi Tablosu -->
                <div class="mt-12 overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="text-gray-500 border-b border-slate-800 text-[10px] font-black uppercase tracking-widest">
                                <th class="pb-4">Zaman Damgası</th>
                                <th class="pb-4">Ağırlık (KG)</th>
                                <th class="pb-4 text-center">Sıcaklık</th>
                                <th class="pb-4 text-right">Sağlık</th>
                            </tr>
                        </thead>
                        <tbody id="history-table" class="divide-y divide-slate-800/50 text-sm">
                            <!-- Veriler buraya akacak -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- ADAFRUIT KONFİGÜRASYONU ---
        const AIO_USER = "nexoria697"; 
        const AIO_KEY = "aio_BxZk63aB1YingtcxH9nkykQneqlM"; 

        // Veritabanı
        let db = JSON.parse(localStorage.getItem('nexoria_db')) || {};
        let activeID = null;

        // Manuel Ekleme
        function hayvanEkle() {
            const id = document.getElementById('add-rfid').value.trim();
            const name = document.getElementById('add-name').value.trim();
            if(id && name) {
                if(!db[id]) {
                    db[id] = { name: name, history: [] };
                    saveDB();
                    renderList();
                    alert("Hayvan başarıyla eklendi!");
                } else { alert("Bu ID zaten kayıtlı!"); }
            }
        }

        async function pullData() {
            try {
                const feeds = ['hayvan-id', 'agirlik', 'sicaklik'];
                const results = await Promise.all(feeds.map(f => 
                    fetch(`https://io.adafruit.com/api/v2/${AIO_USER}/feeds/${f}/data/last`, {
                        headers: {'X-AIO-Key': AIO_KEY}
                    }).then(r => r.json())
                ));

                const [idVal, kgVal, tempVal] = results.map(r => r.value);

                if(idVal) {
                    processIncoming(idVal, kgVal, tempVal);
                    document.getElementById('sync-status').innerHTML = '<span class="text-green-400">● CANLI VERİ AKIŞI</span>';
                }
            } catch (err) {
                document.getElementById('sync-status').innerText = "Bağlantı Hatası!";
            }
        }

        function processIncoming(rfid, kg, temp) {
            // Veri değişmiş mi kontrolü (Mükerrer kaydı önler)
            const checkKey = rfid + kg + temp;
            if(window.lastDataKey === checkKey) return;
            window.lastDataKey = checkKey;

            if(!db[rfid]) {
                db[rfid] = { name: "Yeni Hayvan " + rfid.slice(-4), history: [] };
            }

            const record = {
                time: new Date().toLocaleString('tr-TR'),
                kg: kg,
                temp: temp,
                status: parseFloat(temp) > 39.2 ? "KRİTİK" : "NORMAL"
            };

            db[rfid].history.unshift(record); // Her yeni veriyi en başa ekle (Kaydetme burası!)
            saveDB();
            renderList();
            updateDashboard(rfid);
        }

        function updateDashboard(rfid) {
            activeID = rfid;
            const animal = db[rfid];
            document.getElementById('view-id').innerText = "#" + rfid;
            document.getElementById('view-name').innerText = animal.name;
            
            if(animal.history.length > 0) {
                const last = animal.history[0];
                document.getElementById('last-kg').innerText = last.kg;
                document.getElementById('last-temp').innerText = last.temp;
            }

            const table = document.getElementById('history-table');
            table.innerHTML = animal.history.map(h => `
                <tr class="hover:bg-white/5 transition">
                    <td class="py-4 text-gray-400 font-mono text-[11px]">${h.time}</td>
                    <td class="py-4 font-black text-white text-lg">${h.kg}</td>
                    <td class="py-4 text-center font-bold text-gray-300 italic">${h.temp}°C</td>
                    <td class="py-4 text-right">
                        <span class="px-3 py-1 rounded-full text-[10px] font-black ${h.status === 'KRİTİK' ? 'bg-red-500 text-white animate-pulse' : 'bg-green-500/20 text-green-400 border border-green-500/20'}">${h.status}</span>
                    </td>
                </tr>
            `).join('');
        }

        function renderList() {
            const container = document.getElementById('animal-list');
            container.innerHTML = Object.keys(db).map(rfid => `
                <button onclick="updateDashboard('${rfid}')" class="w-full text-left p-4 rounded-2xl bg-slate-800/30 border border-slate-800 hover:border-sky-500 transition group flex justify-between items-center">
                    <div>
                        <p class="text-[9px] font-mono text-sky-400 font-black tracking-tighter">ID: ${rfid}</p>
                        <p class="text-sm font-bold text-white uppercase tracking-tighter">${db[rfid].name}</p>
                    </div>
                    <i class="fas fa-arrow-right text-gray-700 group-hover:text-sky-400 text-xs transition"></i>
                </button>
            `).join('');
        }

        function saveDB() { localStorage.setItem('nexoria_db', JSON.stringify(db)); }

        // 5 saniyede bir Adafruit kontrolü
        setInterval(pullData, 5000);
        renderList();
    </script>
</body>
</html>
