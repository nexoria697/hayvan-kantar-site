<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexoria | Otomatik Takip Sistemi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #0b0f1a; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1.25rem; }
        .neon-border { border: 1px solid #38bdf8; box-shadow: 0 0 20px rgba(56, 189, 248, 0.1); }
        @media print { .no-print { display: none !important; } body { background: white; color: black; } .glass-card { border: 1px solid #000; } }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- Üst Menü -->
    <nav class="flex justify-between items-center mb-8 glass-card p-5 neon-border no-print">
        <div class="flex items-center gap-4">
            <i class="fas fa-microchip text-sky-400 text-3xl"></i>
            <h1 class="text-xl font-black text-white italic">NEXORIA <span class="text-sky-400 underline">AUTO-SYNC</span></h1>
        </div>
        <div class="flex items-center gap-4">
            <div id="sync-indicator" class="text-[10px] font-bold text-green-400 uppercase bg-green-500/10 px-3 py-1 rounded-full border border-green-500/20">
                <i class="fas fa-sync fa-spin mr-1"></i> Canlı Senkronize
            </div>
            <div class="bg-slate-800 px-4 py-2 rounded-full border border-slate-700 text-sm font-bold">
                <i class="fab fa-google text-red-400 mr-2"></i> Bilge
            </div>
        </div>
    </nav>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <!-- Sol: Hayvan Listesi ve Arama -->
        <div class="space-y-6 no-print">
            <div class="glass-card p-6">
                <h3 class="font-black mb-4 uppercase italic text-xs tracking-widest text-sky-400">Kayıtlı Hayvanlar</h3>
                <!-- Yeni Arama Kutusu (Sorgulama Değil, Filtreleme) -->
                <div class="relative mb-6">
                    <i class="fas fa-search absolute left-3 top-3.5 text-gray-500 text-xs"></i>
                    <input type="text" id="quick-filter" onkeyup="filtrele()" placeholder="İsim veya ID yaz..." class="w-full bg-slate-900/50 border border-slate-700 p-3 pl-10 rounded-xl text-xs focus:border-sky-500 outline-none transition">
                </div>
                <div id="animal-list-btns" class="space-y-2 max-h-[500px] overflow-y-auto pr-2">
                    <!-- Hayvanlar otomatik buraya listelenecek -->
                </div>
            </div>

            <!-- Temizle Butonu -->
            <button onclick="if(confirm('Tüm verileri silmek istediğine emin misin?')) { localStorage.clear(); location.reload(); }" class="w-full no-print bg-red-500/10 text-red-500 border border-red-500/20 py-3 rounded-xl text-[10px] font-black uppercase hover:bg-red-500 hover:text-white transition">
                <i class="fas fa-trash-alt mr-2"></i> Veritabanını Boşalt
            </button>
        </div>

        <!-- Sağ: Otomatik Veri ve Rapor Alanı -->
        <div class="lg:col-span-2 space-y-6">
            <div id="main-display" class="glass-card p-8 neon-border relative overflow-hidden">
                <!-- Arkaplan Dekoru -->
                <i class="fas fa-cow absolute -right-10 -bottom-10 text-[200px] text-white/5 rotate-12"></i>
                
                <div class="flex justify-between items-start mb-10 relative z-10">
                    <div>
                        <p class="text-sky-400 text-xs font-black tracking-[0.3em] uppercase mb-2">Sistemdeki Son Hareket</p>
                        <h2 id="view-id" class="text-6xl font-mono font-black text-white">#------</h2>
                        <div class="flex items-center gap-3 mt-3">
                             <h3 id="view-name" class="text-2xl text-gray-400 font-bold uppercase italic tracking-tighter">Veri Bekleniyor...</h3>
                             <span id="active-tag" class="hidden px-2 py-0.5 bg-sky-500 text-[10px] font-black text-white rounded">SON OKUNAN</span>
                        </div>
                    </div>
                    <button onclick="window.print()" class="no-print bg-white text-black px-6 py-3 rounded-xl font-black hover:bg-sky-400 transition flex items-center gap-2 shadow-lg shadow-white/10">
                        <i class="fas fa-print"></i> DÖKÜMANI YAZDIR
                    </button>
                </div>

                <div class="relative z-10">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="text-gray-500 border-b border-slate-800 text-[10px] font-black uppercase tracking-widest">
                                <th class="pb-4">Ölçüm Zamanı</th>
                                <th class="pb-4 text-center">Ağırlık (KG)</th>
                                <th class="pb-4 text-center">Sıcaklık (°C)</th>
                                <th class="pb-4 text-right">Sağlık Durumu</th>
                            </tr>
                        </thead>
                        <tbody id="history-table" class="divide-y divide-slate-800/50 text-sm">
                            <!-- Veriler otomatik dökülecek -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- AYARLAR ---
        const AIO_USER = "nexoria697"; 
        const AIO_KEY = "aio_BxZk63aB1YingtcxH9nkykQneqlM"; 

        let db = JSON.parse(localStorage.getItem('nexoria_db')) || {};

        async function fetchAdafruit() {
            try {
                const [resId, resKg, resTemp] = await Promise.all([
                    fetch(`https://io.adafruit.com/api/v2/${AIO_USER}/feeds/hayvan-id/data/last`, { headers: {'X-AIO-Key': AIO_KEY} }),
                    fetch(`https://io.adafruit.com/api/v2/${AIO_USER}/feeds/agirlik/data/last`, { headers: {'X-AIO-Key': AIO_KEY} }),
                    fetch(`https://io.adafruit.com/api/v2/${AIO_USER}/feeds/sicaklik/data/last`, { headers: {'X-AIO-Key': AIO_KEY} })
                ]);

                const dId = await resId.json();
                const dKg = await resKg.json();
                const dTemp = await resTemp.json();

                if(dId.value) {
                    processData(dId.value, dKg.value, dTemp.value);
                }
            } catch (err) {
                document.getElementById('sync-indicator').innerHTML = '<i class="fas fa-exclamation-triangle text-red-500"></i> Bağlantı Hatası';
            }
        }

        function processData(rfid, kg, temp) {
            const currentHash = rfid + kg + temp;
            if(window.lastProcessed === currentHash) return;
            window.lastProcessed = currentHash;

            if(!db[rfid]) {
                db[rfid] = { name: "İnek " + rfid.slice(-4), history: [] };
            }

            const record = {
                date: new Date().toLocaleString('tr-TR'),
                kg: kg || "0",
                temp: temp || "0",
                status: parseFloat(temp) > 39.5 ? "KRİTİK" : "STABİL"
            };

            db[rfid].history.unshift(record);
            localStorage.setItem('nexoria_db', JSON.stringify(db));
            
            // Yeni veri geldiğinde otomatik o hayvanın dökümanını aç
            updateUI(rfid);
            renderButtons();
            
            // "Son Okunan" etiketi ekle
            document.getElementById('active-tag').classList.remove('hidden');
        }

        function updateUI(rfid) {
            const animal = db[rfid];
            if(!animal) return;

            document.getElementById('view-id').innerText = "#" + rfid;
            document.getElementById('view-name').innerText = animal.name;

            const table = document.getElementById('history-table');
            table.innerHTML = animal.history.map(h => `
                <tr class="hover:bg-white/5 transition">
                    <td class="py-4 font-medium text-gray-400 text-xs">${h.date}</td>
                    <td class="py-4 text-center font-black text-white text-lg">${h.kg} <span class="text-[10px] text-gray-500">kg</span></td>
                    <td class="py-4 text-center font-black text-white text-lg">${h.temp} <span class="text-[10px] text-gray-500">°C</span></td>
                    <td class="py-4 text-right">
                        <span class="px-2 py-1 rounded text-[10px] font-black ${h.status === 'KRİTİK' ? 'bg-red-500 text-white animate-pulse' : 'bg-green-500/20 text-green-400 border border-green-500/20'}">${h.status}</span>
                    </td>
                </tr>
            `).join('');
        }

        function renderButtons(filter = "") {
            const container = document.getElementById('animal-list-btns');
            const keys = Object.keys(db).filter(id => id.includes(filter) || db[id].name.toLowerCase().includes(filter.toLowerCase()));
            
            container.innerHTML = keys.map(rfid => `
                <button onclick="updateUI('${rfid}'); document.getElementById('active-tag').classList.add('hidden');" class="w-full text-left p-4 rounded-xl bg-slate-800/30 border border-slate-700 hover:border-sky-500 transition group flex justify-between items-center">
                    <div>
                        <p class="text-[10px] font-mono text-sky-400 font-bold">#${rfid}</p>
                        <p class="text-sm font-bold text-white uppercase tracking-tighter">${db[rfid].name}</p>
                    </div>
                    <i class="fas fa-chevron-right text-gray-700 group-hover:text-sky-500 transition"></i>
                </button>
            `).join('');
        }

        function filtrele() {
            const val = document.getElementById('quick-filter').value;
            renderButtons(val);
        }

        // Başlat
        setInterval(fetchAdafruit, 5000);
        renderButtons();
    </script>
</body>
</html>
