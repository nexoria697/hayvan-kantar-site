<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexoria Agro Core - Akıllı Hayvan Kantarı</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans antialiased">

    <header class="bg-gray-800 border-b border-gray-700 p-5 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-emerald-400 tracking-wider">NEXORIA AGRO CORE</h1>
            <span class="bg-emerald-500/10 text-emerald-400 border border-emerald-500/30 px-3 py-1 rounded-full text-sm font-semibold">⚡ Çiftlik Takip Sistemi v2.0</span>
        </div>
    </header>

    <main class="container mx-auto p-4 py-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="bg-gray-800 p-6 rounded-2xl border border-gray-700 shadow-xl h-fit">
            <h2 class="text-xl font-bold text-gray-200 mb-4 flex items-center gap-2">
                ➕ Yeni Hayvan Girişi
            </h2>
            <form id="hayvanForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">RFID Numarası</label>
                    <input type="text" id="rfidNo" required placeholder="Örn: 123456789" class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-emerald-500 transition">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Hayvan Grubu / Kategorisi</label>
                    <select id="hayvanKategori" class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-emerald-500 transition">
                        <option value="Genç Hayvan">🐄 Genç Hayvan</option>
                        <option value="Yeni Doğan">🍼 Yeni Doğan</option>
                        <option value="Süt İneği">🥛 Süt İneği</option>
                        <option value="Erkek İnek">🐂 Erkek İnek</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Güncel Ağırlık (Kg)</label>
                    <input type="number" id="hayvanKilo" required placeholder="Örn: 450" class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-emerald-500 transition">
                </div>
                <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 px-4 rounded-xl transition duration-200 transform active:scale-95 shadow-lg shadow-emerald-600/20">
                    Kantara Kaydet
                </button>
            </form>
        </div>

        <div class="lg:col-span-2 bg-gray-800 p-6 rounded-2xl border border-gray-700 shadow-xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-gray-200">📋 Kayıtlı Sürü ve Güncel Durum</h2>
                <span id="toplamHayvan" class="bg-gray-700 text-gray-300 px-3 py-1 rounded-lg text-sm font-medium">Toplam: 0 Baş</span>
            </div>

            <div class="overflow-x-auto rounded-xl border border-gray-700">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-900 text-gray-400 text-sm uppercase font-semibold">
                            <th class="p-4 border-b border-gray-700">RFID NO</th>
                            <th class="p-4 border-b border-gray-700">HAYVAN GRUBU</th>
                            <th class="p-4 border-b border-gray-700">SON ÖLÇÜLEN KİLO</th>
                            <th class="p-4 border-b border-gray-700 text-center">İŞLEMLER</th>
                        </tr>
                    </thead>
                    <tbody id="suruListesi" class="divide-y divide-gray-700 text-gray-300">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="detayModal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-gray-800 border border-gray-700 max-w-2xl w-full rounded-2xl p-6 shadow-2xl relative">
            <button onclick="modalKapat()" class="absolute top-4 right-4 text-gray-400 hover:text-white text-xl font-bold">&times;</button>
            
            <h3 class="text-2xl font-bold text-emerald-400 mb-2" id="modalRfidBaslik">RFID: 123456</h3>
            <p class="text-gray-400 mb-6 font-medium">Kategori: <span id="modalKategoriText" class="text-white"></span></p>
            
            <h4 class="text-md font-semibold text-gray-300 mb-3 uppercase tracking-wider">📈 Hayvanın Geçmiş Tartım Kayıtları</h4>
            <div class="max-h-60 overflow-y-auto rounded-xl border border-gray-700 bg-gray-900 mb-6">
                <table class="w-full text-left text-sm">
                    <thead class="bg-gray-950 text-gray-400 sticky top-0">
                        <tr>
                            <th class="p-3">Tarih / Saat</th>
                            <th class="p-3">Ölçülen Ağırlık</th>
                        </tr>
                    </thead>
                    <tbody id="modalGecmisTablo" class="divide-y divide-gray-800">
                        </tbody>
                </table>
            </div>

            <div class="flex gap-4">
                <button onclick="hayvanPdfAl()" class="flex-1 bg-sky-600 hover:bg-sky-500 text-white font-bold py-3 rounded-xl transition">
                    📄 Geçmiş Raporunu PDF İndir
                </button>
                <button onclick="modalKapat()" class="bg-gray-700 hover:bg-gray-600 text-gray-300 font-bold py-3 px-6 rounded-xl transition">
                    Kapat
                </button>
            </div>
        </div>
    </div>

    <script>
        // Sayfa yüklendiğinde sürü verilerini hafızadan çek
        let suru = JSON.parse(localStorage.getItem('nexoria_suru')) || {};
        let seciliRfid = null; // Detay penceresinde hangi hayvanın açık olduğunu tutar

        const hayvanForm = document.getElementById('hayvanForm');
        const suruListesi = document.getElementById('suruListesi');
        const toplamHayvanEkrani = document.getElementById('toplamHayvan');

        // Form Gönderildiğinde (Yeni Ölçüm Geldiğinde)
        hayvanForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const rfid = document.getElementById('rfidNo').value.trim();
            const kategori = document.getElementById('hayvanKategori').value;
            const kilo = parseFloat(document.getElementById('hayvanKilo').value);
            const simdi = new Date().toLocaleString('tr-TR');

            // Eğer bu RFID sistemde yoksa yeni kayıt oluştur
            if (!suru[rfid]) {
                suru[rfid] = {
                    kategori: kategori,
                    gecmis: []
                };
            } else {
                // Hayvan zaten varsa, kategorisini güncellemiş olabiliriz
                suru[rfid].kategori = kategori;
            }

            // Yeni tartım verisini geçmiş listesinin EN BAŞINA ekle
            suru[rfid].gecmis.unshift({ tarih: simdi, kilo: kilo });

            // Hafızayı güncelle ve listeyi yenile
            hafizayaKaydet();
            arayuzuGuncelle();
            hayvanForm.reset();
        });

        // Verileri Tarayıcı Hafızasına Yazma
        function hafizayaKaydet() {
            localStorage.setItem('nexoria_suru', JSON.stringify(suru));
        }

        // Ana Tabloyu Ekrana Basma
        function arayuzuGuncelle() {
            suruListesi.innerHTML = '';
            const rfidListesi = Object.keys(suru);
            toplamHayvanEkrani.innerText = `Toplam: ${rfidListesi.length} Baş`;

            if (rfidListesi.length === 0) {
                suruListesi.innerHTML = `<tr><td colspan="4" class="p-8 text-center text-gray-500 italic">Sürüde kayıtlı hayvan bulunmuyor, kral.</td></tr>`;
                return;
            }

            rfidListesi.forEach(rfid => {
                const hayvan = suru[rfid];
                const sonTartim = hayvan.gecmis[0]; // En son tartım

                const satir = document.createElement('tr');
                satir.className = "hover:bg-gray-700/50 transition cursor-pointer";
                
                satir.innerHTML = `
                    <td class="p-4 font-mono font-bold text-emerald-400" onclick="detayAc('${rfid}')">${rfid}</td>
                    <td class="p-4 font-semibold" onclick="detayAc('${rfid}')">${hayvan.kategori}</td>
                    <td class="p-4 font-bold text-white" onclick="detayAc('${rfid}')">${sonTartim.kilo} kg <span class="text-xs text-gray-500 font-normal block">${sonTartim.tarih}</span></td>
                    <td class="p-4 text-center">
                        <button onclick="hayvanSil('${rfid}')" class="bg-red-500/10 hover:bg-red-500 text-red-400 hover:text-white px-3 py-1.5 rounded-lg text-xs font-bold border border-red-500/20 transition duration-150">
                            Sil 🗑️
                        </button>
                    </td>
                `;
                suruListesi.appendChild(satir);
            });
        }

        // Hayvan Detay Penceresini Açma (RFID Numarasına tıklandığında)
        function detayAc(rfid) {
            seciliRfid = rfid;
            const hayvan = suru[rfid];
            
            document.getElementById('modalRfidBaslik').innerText = `📌 RFID NO: ${rfid}`;
            document.getElementById('modalKategoriText').innerText = hayvan.kategori;
            
            const gecmisTablo = document.getElementById('modalGecmisTablo');
            gecmisTablo.innerHTML = '';

            hayvan.gecmis.forEach(kayit => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="p-3 text-gray-400">${kayit.tarih}</td>
                    <td class="p-3 font-bold text-white">${kayit.kilo} Kg</td>
                `;
                gecmisTablo.appendChild(tr);
            });

            document.getElementById('detayModal').classList.remove('hidden');
        }

        // Pencereyi Kapatma
        function modalKapat() {
            document.getElementById('detayModal').classList.add('hidden');
            seciliRfid = null;
        }

        // Hayvanı Listeden ve Hafızadan Tamamen Silme
        function hayvanSil(rfid) {
            if (confirm(`⚠️ ${rfid} nolu RFID kartına sahip hayvanı ve TÜM geçmiş verilerini silmek istediğine emin misin, kral?`)) {
                delete suru[rfid];
                hafizayaKaydet();
                arayuzuGuncelle();
            }
        }

        // Seçili Hayvanın Tüm Geçmişini PDF Olarak Çıktı Alma
        function hayvanPdfAl() {
            if (!seciliRfid) return;
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const h = suru[seciliRfid];

            // PDF Tasarımı ve Başlıkları
            doc.setFont("Helvetica", "bold");
            doc.text("NEXORIA AGRO CORE - HAYVAN GEÇMİŞ RAPORU", 14, 20);
            doc.setFont("Helvetica", "normal");
            doc.text(`Rapor Tarihi: ${new Date().toLocaleString('tr-TR')}`, 14, 28);
            doc.line(14, 32, 196, 32);

            doc.text(`RFID Numarasi: ${seciliRfid}`, 14, 42);
            doc.text(`Hayvan Grubu: ${h.kategori}`, 14, 50);
            doc.line(14, 55, 196, 55);

            doc.setFont("Helvetica", "bold");
            doc.text("Tarih / Saat", 14, 65);
            doc.text("Ölçülen Ağırlık (Kg)", 100, 65);
            doc.line(14, 68, 196, 68);

            doc.setFont("Helvetica", "normal");
            let y = 76;
            h.gecmis.forEach(kayit => {
                doc.text(kayit.tarih, 14, y);
                doc.text(`${kayit.kilo} Kg`, 100, y);
                y += 10;
                // Sayfa sınırını kontrol etme
                if (y > 280) {
                    doc.addPage();
                    y = 20;
                }
            });

            // Dosyayı RFID numarasıyla kaydetme
            doc.save(`AgroCore_RFID_${seciliRfid}_Rapori.pdf`);
        }

        // Sayfa ilk açıldığında tabloyu bas
        arayuzuGuncelle();
    </script>
</body>
</html>
