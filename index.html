<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexoria | Pro Hayvan Takip</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #0b0f1a; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1.25rem; }
        .neon-border { border: 1px solid #38bdf8; box-shadow: 0 0 20px rgba(56, 189, 248, 0.1); }
        @media print { .no-print { display: none; } body { background: white; color: black; } .glass-card { border: 1px solid #ccc; backdrop-filter: none; } }
    </style>
</head>
<body class="min-h-screen p-4 md:p-10">

    <!-- Üst Menü -->
    <nav class="flex justify-between items-center mb-10 glass-card p-5 neon-border no-print">
        <div class="flex items-center gap-4">
            <i class="fas fa-microchip text-sky-400 text-3xl"></i>
            <h1 class="text-xl font-black text-white">NEXORIA <span class="text-sky-400 underline">AGRO CORE</span></h1>
        </div>
        <div class="flex items-center gap-3 bg-slate-800 px-4 py-2 rounded-full border border-slate-700">
            <i class="fab fa-google text-red-400"></i>
            <span class="text-sm font-semibold">Bilge (Admin)</span>
        </div>
    </nav>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <!-- Veri Giriş ve Yönetim -->
        <div class="space-y-6 no-print">
            <div class="glass-card p-6 border-t-4 border-t-sky-500">
                <h3 class="font-black mb-4 uppercase italic">Hayvan Kayıt Paneli</h3>
                <div class="space-y-4">
                    <input id="inp-rfid" type="text" placeholder="RFID Numarası" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-lg text-white">
                    <input id="inp-name" type="text" placeholder="İnek Adı/Künyesi" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-lg text-white">
                    <button onclick="inekEkle()" class="w-full bg-sky-600 hover:bg-sky-500 text-white font-black py-3 rounded-xl transition">SİSTEME KAYDET</button>
                </div>
            </div>

            <div class="glass-card p-6">
                <h3 class="font-black mb-4 uppercase italic">ID ile Veri Sorgula</h3>
                <input id="search-id" type="text" onkeyup="ara()" placeholder="ID Giriniz..." class="w-full bg-slate-900 border border-slate-700 p-3 rounded-lg text-white mb-4">
                <p class="text-[10px] text-gray-500 font-bold">Kayıtlı hayvanları aşağıdan görebilirsin.</p>
            </div>
        </div>

        <!-- Canlı Panel ve Tablo -->
        <div class="lg:col-span-2 space-y-8">
            <div id="print-area" class="glass-card p-8 neon-border bg-gradient-to-br from-slate-800/30 to-transparent">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <p class="text-sky-400 text-xs font-black tracking-widest uppercase">Seçili Hayvan Raporu</p>
                        <h2 id="view-id" class="text-5xl font-mono font-black text-white mt-2">#------</h2>
                        <p id="view-name" class="text-gray-400 font-bold mt-1 uppercase italic">Henüz Seçilmedi</p>
                    </div>
                    <button onclick="window.print()" class="no-print bg-slate-700 p-3 rounded-lg hover:bg-sky-600 transition">
                        <i class="fas fa-print"></i> DÖKÜMAN ÇIKART
                    </button>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-slate-900/80 p-6 rounded-xl border border-slate-800">
                        <span class="text-xs text-gray-500 font-bold">SON ÖLÇÜLEN AĞIRLIK</span>
                        <div class="text-3xl font-black text-white mt-2"><span id="view-kg">0</span> KG</div>
                    </div>
                    <div class="bg-slate-900/80 p-6 rounded-xl border border-slate-800">
                        <span class="text-xs text-gray-500 font-bold">VÜCUT SICAKLIĞI</span>
                        <div class="text-3xl font-black text-white mt-2"><span id="view-temp">0</span> °C</div>
                    </div>
                </div>
            </div>

            <!-- Liste Tablosu -->
            <div class="glass-card p-6 no-print">
                <h3 class="font-black mb-4"><i class="fas fa-database text-sky-500 mr-2"></i>KAYITLI HAYVANLAR</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm">
                        <thead class="text-gray-500 border-b border-slate-800 uppercase text-[10px]">
                            <tr>
                                <th class="pb-3">RFID ID</th>
                                <th class="pb-3">İSİM</th>
                                <th class="pb-3">AĞIRLIK</th>
                                <th class="pb-3">İŞLEM</th>
                            </tr>
                        </thead>
                        <tbody id="animal-list" class="divide-y divide-slate-800">
                            <!-- JS ile dolacak -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Veritabanı simülasyonu (Tarayıcı hafızası)
        let inekler = JSON.parse(localStorage.getItem('inekler')) || [];

        function inekEkle() {
            const id = document.getElementById('inp-rfid').value;
            const name = document.getElementById('inp-name').value;
            
            if(!id || !name) return alert("Hacı boş alan bırakma!");

            const yeniInek = {
                id: id,
                name: name,
                kg: Math.floor(Math.random() * (750 - 450) + 450), // Simülasyon verisi
                temp: (Math.random() * (39.5 - 37.5) + 37.5).toFixed(1)
            };

            inekler.push(yeniInek);
            localStorage.setItem('inekler', JSON.stringify(inekler));
            renderList();
            
            document.getElementById('inp-rfid').value = '';
            document.getElementById('inp-name').value = '';
        }

        function renderList(liste = inekler) {
            const container = document.getElementById('animal-list');
            container.innerHTML = liste.map((inek, index) => `
                <tr>
                    <td class="py-4 font-mono text-sky-400 font-bold">#${inek.id}</td>
                    <td class="py-4 font-bold uppercase">${inek.name}</td>
                    <td class="py-4">${inek.kg} kg</td>
                    <td class="py-4">
                        <button onclick="goruntule(${index})" class="text-sky-400 mr-3"><i class="fas fa-eye"></i></button>
                        <button onclick="sil(${index})" class="text-red-500"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        function goruntule(index) {
            const inek = inekler[index];
            document.getElementById('view-id').innerText = "#" + inek.id;
            document.getElementById('view-name').innerText = inek.name;
            document.getElementById('view-kg').innerText = inek.kg;
            document.getElementById('view-temp').innerText = inek.temp;
        }

        function sil(index) {
            if(confirm("Silmek istediğine emin misin hacı?")) {
                inekler.splice(index, 1);
                localStorage.setItem('inekler', JSON.stringify(inekler));
                renderList();
            }
        }

        function ara() {
            const query = document.getElementById('search-id').value;
            const filtered = inekler.filter(i => i.id.includes(query));
            renderList(filtered);
        }

        // Başlangıçta listeyi yükle
        renderList();
    </script>
</body>
</html>
